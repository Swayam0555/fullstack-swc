<div class="min-h-screen bg-slate-950 font-sans text-slate-100 flex flex-col justify-between">
  <!-- Header -->
  <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🔑</span>
        <div>
          <h1 class="text-lg font-bold text-white leading-none">GameKey Store</h1>
          <p class="text-xs text-slate-400">Inventory Management Portal</p>
        </div>
      </div>
      <nav class="flex items-center gap-6 text-sm font-medium text-slate-400">
        <a routerLink="/games" routerLinkActive="text-emerald-400" [routerLinkActiveOptions]="{exact: true}" class="hover:text-white transition">Catalog</a>
        <a routerLink="/games/add" routerLinkActive="text-emerald-400" class="hover:text-white transition">Add Game</a>
        
        <div class="flex items-center gap-2 bg-slate-900 border border-slate-800/80 px-3 py-1.5 rounded-lg text-slate-200 text-xs select-none">
          <span>🛒</span>
          <span class="font-bold text-emerald-400">{{ cartService.totalItems() }}</span>
          <span class="text-slate-500">|</span>
          <span class="font-bold text-slate-200">${{ cartService.totalPrice() | number:'1.2-2' }}</span>
        </div>

        <span class="text-emerald-400 flex items-center gap-1.5 ml-2">
          <span class="h-2 w-2 rounded-full bg-emerald-400"></span> Live Portal
        </span>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-900 bg-slate-950 py-6 text-center text-xs text-slate-500">
    <p>&copy; 2026 GameKey Store Admin. Day 2 Completed.</p>
  </footer>
</div>
