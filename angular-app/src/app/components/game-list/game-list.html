<div class="max-w-4xl mx-auto my-8 p-6 bg-slate-900/80 backdrop-blur-md rounded-2xl border border-slate-800 shadow-2xl text-white">
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-800">
    <h2 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent flex items-center gap-2">
      <span>🎮</span> Game Inventory Management
    </h2>
    <span class="px-3 py-1 bg-slate-800 rounded-full text-xs font-mono text-emerald-400 border border-slate-700/50">
      {{ games.length }} Items
    </span>
  </div>

  <!-- Add Game Form -->
  <div class="bg-slate-950/50 p-6 rounded-xl border border-slate-800/80 mb-8 flex flex-col md:flex-row gap-4 items-end">
    <div class="flex-1 w-full">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Game Title</label>
      <input type="text" [(ngModel)]="newGameTitle" placeholder="e.g. Half-Life 3" 
             class="w-full px-4 py-2.5 bg-slate-900 rounded-lg border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition text-sm text-slate-100 placeholder-slate-500" />
    </div>
    <div class="w-full md:w-36">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Price ($)</label>
      <input type="number" [(ngModel)]="newGamePrice" placeholder="0.00" 
             class="w-full px-4 py-2.5 bg-slate-900 rounded-lg border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition text-sm text-slate-100 placeholder-slate-500" />
    </div>
    <button (click)="addGame()" 
            class="w-full md:w-auto px-6 py-2.5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-slate-950 font-bold rounded-lg shadow-lg hover:shadow-emerald-500/10 active:scale-95 transition text-sm">
      Add Game
    </button>
  </div>

  <!-- Game List -->
  @if (games.length === 0) {
    <div class="text-center py-12 bg-slate-950/20 border border-dashed border-slate-800 rounded-xl">
      <p class="text-slate-400 text-sm">No games in inventory. Add one above to get started!</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (game of games; track game.id) {
        <app-game-card 
          [game]="game" 
          (remove)="onRemoveGame($event)">
        </app-game-card>
      }
    </div>
  }
</div>
