<div class="p-6 bg-slate-900/90 backdrop-blur-md rounded-xl border border-slate-800 shadow-xl hover:border-emerald-500/30 transition duration-300 flex flex-col justify-between h-full">
  <div>
    <div class="flex items-start justify-between gap-2 mb-3">
      <h3 class="text-lg font-bold text-white leading-tight">
        {{ game.title }}
      </h3>
      <span class="text-sm font-bold text-emerald-400 font-mono">
        ${{ game.price | number:'1.2-2' }}
      </span>
    </div>

    <div class="mb-4">
      @if (game.available) {
        <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span> In Stock
        </span>
      } @else {
        <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium bg-rose-500/10 text-rose-400 border border-rose-500/20">
          <span class="h-1.5 w-1.5 rounded-full bg-rose-400"></span> Out of Stock
        </span>
      }
    </div>

    <!-- Demonstration of custom pipe formatting keys -->
    <div class="mt-4 p-3 bg-slate-950 rounded-lg border border-slate-900/60 text-xs">
      <span class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Demo Key Preview</span>
      <code class="text-slate-300 font-mono select-all">{{ mockKey | keyFormat }}</code>
    </div>
  </div>

  <div class="mt-6 space-y-3 pt-4 border-t border-slate-800/40">
    <div class="flex items-center justify-between gap-2">
      <a [routerLink]="['/games', game.id]" 
         class="flex-1 text-center px-3 py-1.5 text-xs font-semibold rounded bg-teal-500/10 hover:bg-teal-500/20 text-teal-400 border border-teal-500/20 hover:border-teal-500/30 transition active:scale-95">
        Details
      </a>
      
      <button (click)="addToCart()" 
              class="flex-1 px-3 py-1.5 text-xs font-semibold rounded bg-emerald-500 hover:bg-emerald-400 text-slate-950 transition active:scale-95">
        Add to Cart
      </button>
    </div>

    <div class="flex items-center justify-between gap-2">
      <button (click)="toggleAvailability()" 
              class="flex-1 px-3 py-1.5 text-xs font-semibold rounded bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 hover:border-slate-600 transition active:scale-95">
        Toggle Status
      </button>

      <button (click)="onRemoveClick()" 
              class="flex-1 px-3 py-1.5 text-xs font-semibold rounded bg-rose-500/10 hover:bg-rose-500/25 text-rose-400 border border-rose-500/20 hover:border-rose-500/30 transition active:scale-95">
        Remove
      </button>
    </div>
  </div>
</div>
